version: 0.2

phases:
  install:
    runtime-versions:
      golang: 1.25
    commands:
      - pip install aws-sam-cli

  pre_build:
    commands:
      - echo "Running tests..."
      - go test ./...

  build:
    commands:
      - echo "Building with SAM..."
      - sam build

  post_build:
    commands:
      - echo "Deploying with SAM..."
      - sam deploy
        --no-confirm-changeset
        --no-fail-on-empty-changeset
        --stack-name go-lambda-stack
        --capabilities CAPABILITY_IAM
        --resolve-s3
        --region eu-west-1

artifacts:
  files:
    - .aws-sam/**/*